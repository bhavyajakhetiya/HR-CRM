services:
  # ── Backend: Node.js Web Service ──
  - type: web
    name: hrcrm-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: hrcrm-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # ── Frontend: Static Site ──
  - type: web
    name: hrcrm-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hrcrm-backend
          envVarKey: RENDER_EXTERNAL_URL
